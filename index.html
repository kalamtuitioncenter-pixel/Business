<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS & Inventory Management System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            color: #2d3748;
        }

        #root {
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .nav-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .nav-item.active {
            background: rgba(255,255,255,0.2);
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #718096;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #718096;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a202c;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-change.positive {
            color: #48bb78;
        }

        .stat-change.negative {
            color: #f56565;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #f7fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }

        .data-table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .data-table tr:hover {
            background: #f7fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-warning {
            background: #feebc8;
            color: #7c2d12;
        }

        .badge-danger {
            background: #fed7d7;
            color: #742a2a;
        }

        .badge-info {
            background: #bee3f8;
            color: #2c5282;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a202c;
        }

        .modal-footer {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .alert-danger {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .alert-warning {
            background: #feebc8;
            color: #7c2d12;
            border-left: 4px solid #ed8936;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-weight: 600;
            color: #718096;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .chart-container {
            height: 300px;
            margin: 20px 0;
        }

        .prediction-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .prediction-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .prediction-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .prediction-trend {
            font-size: 14px;
            opacity: 0.9;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .low-stock {
            color: #f56565;
            font-weight: 600;
        }

        .repack-input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 12px;
        }

        .payment-history {
            border-left: 3px solid #667eea;
            padding-left: 16px;
            margin: 12px 0;
        }

        .payment-entry {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .payment-entry:last-child {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Utility functions for localStorage with persistence
        const STORAGE_KEYS = {
            PRODUCTS: 'pos_products',
            SALES: 'pos_sales',
            CUSTOMERS: 'pos_customers',
            LOYALTY: 'pos_loyalty',
            PAYMENTS: 'pos_payments',
            REPACKS: 'pos_repacks',
            STOCK_MOVEMENTS: 'pos_stock_movements'
        };

        const loadData = (key) => {
            try {
                const data = window.storage ? null : localStorage.getItem(key);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                return null;
            }
        };

        const saveData = (key, data) => {
            if (!window.storage) {
                localStorage.setItem(key, JSON.stringify(data));
            }
        };

        // Initialize sample data
        const initializeData = () => {
            if (!loadData(STORAGE_KEYS.PRODUCTS)) {
                const sampleProducts = [
                    { id: 1, name: 'Rice 100gm', stock: 50, price: 50, category: 'Groceries', unit: 'pack', weight: 100 },
                    { id: 2, name: 'Rice 20gm', stock: 100, price: 15, category: 'Groceries', unit: 'pack', weight: 20 },
                    { id: 3, name: 'Rice 50gm', stock: 75, price: 30, category: 'Groceries', unit: 'pack', weight: 50 },
                    { id: 4, name: 'Rice 250gm', stock: 20, price: 120, category: 'Groceries', unit: 'pack', weight: 250 },
                    { id: 5, name: 'Sugar 1kg', stock: 30, price: 45, category: 'Groceries', unit: 'pack', weight: 1000 },
                ];
                saveData(STORAGE_KEYS.PRODUCTS, sampleProducts);
            }

            if (!loadData(STORAGE_KEYS.CUSTOMERS)) {
                const sampleCustomers = [
                    { id: 1, name: 'Rajesh Kumar', phone: '9876543210', loyaltyPoints: 150 },
                    { id: 2, name: 'Priya Sharma', phone: '9876543211', loyaltyPoints: 280 },
                    { id: 3, name: 'Amit Singh', phone: '9876543212', loyaltyPoints: 95 },
                ];
                saveData(STORAGE_KEYS.CUSTOMERS, sampleCustomers);
            }

            if (!loadData(STORAGE_KEYS.SALES)) {
                saveData(STORAGE_KEYS.SALES, []);
            }

            if (!loadData(STORAGE_KEYS.LOYALTY)) {
                saveData(STORAGE_KEYS.LOYALTY, []);
            }

            if (!loadData(STORAGE_KEYS.PAYMENTS)) {
                saveData(STORAGE_KEYS.PAYMENTS, []);
            }

            if (!loadData(STORAGE_KEYS.REPACKS)) {
                saveData(STORAGE_KEYS.REPACKS, []);
            }

            if (!loadData(STORAGE_KEYS.STOCK_MOVEMENTS)) {
                saveData(STORAGE_KEYS.STOCK_MOVEMENTS, []);
            }
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [products, setProducts] = useState([]);
            const [sales, setSales] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [loyaltyTransactions, setLoyaltyTransactions] = useState([]);
            const [payments, setPayments] = useState([]);
            const [repacks, setRepacks] = useState([]);
            const [stockMovements, setStockMovements] = useState([]);

            useEffect(() => {
                initializeData();
                setProducts(loadData(STORAGE_KEYS.PRODUCTS) || []);
                setSales(loadData(STORAGE_KEYS.SALES) || []);
                setCustomers(loadData(STORAGE_KEYS.CUSTOMERS) || []);
                setLoyaltyTransactions(loadData(STORAGE_KEYS.LOYALTY) || []);
                setPayments(loadData(STORAGE_KEYS.PAYMENTS) || []);
                setRepacks(loadData(STORAGE_KEYS.REPACKS) || []);
                setStockMovements(loadData(STORAGE_KEYS.STOCK_MOVEMENTS) || []);
            }, []);

            useEffect(() => {
                saveData(STORAGE_KEYS.PRODUCTS, products);
            }, [products]);

            useEffect(() => {
                saveData(STORAGE_KEYS.SALES, sales);
            }, [sales]);

            useEffect(() => {
                saveData(STORAGE_KEYS.CUSTOMERS, customers);
            }, [customers]);

            useEffect(() => {
                saveData(STORAGE_KEYS.LOYALTY, loyaltyTransactions);
            }, [loyaltyTransactions]);

            useEffect(() => {
                saveData(STORAGE_KEYS.PAYMENTS, payments);
            }, [payments]);

            useEffect(() => {
                saveData(STORAGE_KEYS.REPACKS, repacks);
            }, [repacks]);

            useEffect(() => {
                saveData(STORAGE_KEYS.STOCK_MOVEMENTS, stockMovements);
            }, [stockMovements]);

            const updateStock = (productId, quantity, type = 'OUT', reference = '') => {
                setProducts(prev => prev.map(p => 
                    p.id === productId 
                        ? { ...p, stock: type === 'OUT' ? p.stock - quantity : p.stock + quantity }
                        : p
                ));

                const movement = {
                    id: Date.now(),
                    productId,
                    quantity,
                    type,
                    reference,
                    date: new Date().toISOString()
                };
                setStockMovements(prev => [...prev, movement]);
            };

            const addLoyaltyPoints = (customerId, points, orderId, type = 'EARNED') => {
                setCustomers(prev => prev.map(c => 
                    c.id === customerId 
                        ? { ...c, loyaltyPoints: type === 'EARNED' ? c.loyaltyPoints + points : c.loyaltyPoints - points }
                        : c
                ));

                const transaction = {
                    id: Date.now(),
                    customerId,
                    orderId,
                    points,
                    type,
                    date: new Date().toISOString()
                };
                setLoyaltyTransactions(prev => [...prev, transaction]);
            };

            const deleteSale = (saleId) => {
                const sale = sales.find(s => s.id === saleId);
                if (!sale) return;

                // Return stock
                sale.items.forEach(item => {
                    updateStock(item.productId, item.quantity, 'IN', `Returned from deleted order ${saleId}`);
                });

                // Reverse loyalty points
                const loyaltyTrans = loyaltyTransactions.filter(lt => lt.orderId === saleId);
                loyaltyTrans.forEach(lt => {
                    setCustomers(prev => prev.map(c => 
                        c.id === lt.customerId 
                            ? { ...c, loyaltyPoints: c.loyaltyPoints - lt.points }
                            : c
                    ));
                });

                // Remove from all modules
                setSales(prev => prev.filter(s => s.id !== saleId));
                setLoyaltyTransactions(prev => prev.filter(lt => lt.orderId !== saleId));
                setPayments(prev => prev.filter(p => p.orderId !== saleId));
            };

            const contextValue = {
                products, setProducts,
                sales, setSales,
                customers, setCustomers,
                loyaltyTransactions, setLoyaltyTransactions,
                payments, setPayments,
                repacks, setRepacks,
                stockMovements, setStockMovements,
                updateStock,
                addLoyaltyPoints,
                deleteSale
            };

            return (
                <div className="app-container">
                    <Sidebar currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <div className="main-content">
                        {currentPage === 'dashboard' && <Dashboard {...contextValue} />}
                        {currentPage === 'sales' && <SalesEntry {...contextValue} />}
                        {currentPage === 'inventory' && <Inventory {...contextValue} />}
                        {currentPage === 'loyalty' && <Loyalty {...contextValue} />}
                        {currentPage === 'pending' && <PendingPayments {...contextValue} />}
                        {currentPage === 'repacking' && <Repacking {...contextValue} />}
                        {currentPage === 'prediction' && <DemandPrediction {...contextValue} />}
                        {currentPage === 'customers' && <Customers {...contextValue} />}
                    </div>
                </div>
            );
        }

        function Sidebar({ currentPage, setCurrentPage }) {
            const menuItems = [
                { id: 'dashboard', icon: '📊', label: 'Dashboard' },
                { id: 'sales', icon: '🛒', label: 'Sales Entry' },
                { id: 'pending', icon: '💳', label: 'Pending Payments' },
                { id: 'inventory', icon: '📦', label: 'Inventory' },
                { id: 'repacking', icon: '🔄', label: 'Repacking' },
                { id: 'loyalty', icon: '⭐', label: 'Loyalty Points' },
                { id: 'prediction', icon: '📈', label: 'Demand Prediction' },
                { id: 'customers', icon: '👥', label: 'Customers' },
            ];

            return (
                <div className="sidebar">
                    <div className="logo">🏪 POS System</div>
                    {menuItems.map(item => (
                        <div
                            key={item.id}
                            className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                            onClick={() => setCurrentPage(item.id)}
                        >
                            <span>{item.icon}</span>
                            <span>{item.label}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function Dashboard({ sales, products, payments, customers }) {
            const today = new Date().toISOString().split('T')[0];
            const todaySales = sales.filter(s => s.date.startsWith(today));
            const totalRevenue = sales.reduce((sum, s) => sum + s.total, 0);
            const todayRevenue = todaySales.reduce((sum, s) => sum + s.total, 0);

            const pendingSales = sales.filter(s => s.paymentStatus === 'PENDING' || s.paymentStatus === 'PARTIAL');
            const totalPending = pendingSales.reduce((sum, s) => {
                const paid = payments.filter(p => p.orderId === s.id).reduce((psum, p) => psum + p.amount, 0);
                return sum + (s.total - paid);
            }, 0);

            const lowStock = products.filter(p => p.stock < 10);

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Dashboard</h1>
                        <p className="page-subtitle">Overview of your business</p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Today's Sales</div>
                            <div className="stat-value">₹{todayRevenue.toLocaleString()}</div>
                            <div className="stat-change positive">↑ {todaySales.length} orders</div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Total Revenue</div>
                            <div className="stat-value">₹{totalRevenue.toLocaleString()}</div>
                            <div className="stat-change">{sales.length} total orders</div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Pending Payments</div>
                            <div className="stat-value">₹{totalPending.toLocaleString()}</div>
                            <div className="stat-change negative">{pendingSales.length} orders</div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Low Stock Items</div>
                            <div className="stat-value">{lowStock.length}</div>
                            <div className="stat-change negative">Requires attention</div>
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{ marginBottom: '16px' }}>Recent Sales</h3>
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Customer</th>
                                        <th>Date</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sales.slice(-5).reverse().map(sale => {
                                        const customer = customers.find(c => c.id === sale.customerId);
                                        return (
                                            <tr key={sale.id}>
                                                <td>#{sale.id}</td>
                                                <td>{customer?.name || 'N/A'}</td>
                                                <td>{new Date(sale.date).toLocaleDateString()}</td>
                                                <td>₹{sale.total}</td>
                                                <td>
                                                    <span className={`badge badge-${
                                                        sale.paymentStatus === 'PAID' ? 'success' : 
                                                        sale.paymentStatus === 'PARTIAL' ? 'warning' : 'danger'
                                                    }`}>
                                                        {sale.paymentStatus}
                                                    </span>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function SalesEntry({ products, customers, sales, setSales, updateStock, addLoyaltyPoints, payments, setPayments, deleteSale }) {
            const [selectedCustomer, setSelectedCustomer] = useState('');
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState('');
            const [quantity, setQuantity] = useState(1);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [currentSale, setCurrentSale] = useState(null);
            const [paymentAmount, setPaymentAmount] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [showChangeCustomer, setShowChangeCustomer] = useState(false);
            const [changeSaleId, setChangeSaleId] = useState(null);
            const [newCustomer, setNewCustomer] = useState('');

            const addToCart = () => {
                if (!selectedProduct || quantity <= 0) return;

                const product = products.find(p => p.id === parseInt(selectedProduct));
                if (!product) return;

                if (product.stock < quantity) {
                    alert(`Insufficient stock! Available: ${product.stock}`);
                    return;
                }

                const existing = cart.find(item => item.productId === product.id);
                if (existing) {
                    setCart(cart.map(item => 
                        item.productId === product.id 
                            ? { ...item, quantity: item.quantity + quantity }
                            : item
                    ));
                } else {
                    setCart([...cart, {
                        productId: product.id,
                        name: product.name,
                        price: product.price,
                        quantity: quantity
                    }]);
                }

                setSelectedProduct('');
                setQuantity(1);
            };

            const removeFromCart = (productId) => {
                setCart(cart.filter(item => item.productId !== productId));
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const completeSale = () => {
                if (!selectedCustomer || cart.length === 0) {
                    alert('Please select customer and add items to cart');
                    return;
                }

                const sale = {
                    id: Date.now(),
                    customerId: parseInt(selectedCustomer),
                    items: cart,
                    total: cartTotal,
                    date: new Date().toISOString(),
                    paymentStatus: 'PENDING'
                };

                // Update stock
                cart.forEach(item => {
                    updateStock(item.productId, item.quantity, 'OUT', `Sale #${sale.id}`);
                });

                // Add loyalty points (1 point per ₹100)
                const points = Math.floor(cartTotal / 100);
                addLoyaltyPoints(sale.customerId, points, sale.id, 'EARNED');

                setSales([...sales, sale]);
                setCurrentSale(sale);
                setShowPaymentModal(true);
            };

            const recordPayment = () => {
                const amount = parseFloat(paymentAmount);
                if (!amount || amount <= 0) {
                    alert('Enter valid payment amount');
                    return;
                }

                const totalPaid = payments
                    .filter(p => p.orderId === currentSale.id)
                    .reduce((sum, p) => sum + p.amount, 0);

                const remaining = currentSale.total - totalPaid;

                if (amount > remaining) {
                    alert(`Amount exceeds balance! Remaining: ₹${remaining}`);
                    return;
                }

                const payment = {
                    id: Date.now(),
                    orderId: currentSale.id,
                    amount: amount,
                    method: paymentMethod,
                    date: new Date().toISOString(),
                    reference: paymentMethod !== 'Cash' ? `REF${Date.now()}` : ''
                };

                setPayments([...payments, payment]);

                const newTotalPaid = totalPaid + amount;
                const newStatus = newTotalPaid >= currentSale.total ? 'PAID' : 
                                 newTotalPaid > 0 ? 'PARTIAL' : 'PENDING';

                setSales(sales.map(s => 
                    s.id === currentSale.id 
                        ? { ...s, paymentStatus: newStatus }
                        : s
                ));

                if (newStatus === 'PAID') {
                    alert('Payment completed!');
                    setShowPaymentModal(false);
                    setCart([]);
                    setSelectedCustomer('');
                    setPaymentAmount('');
                } else {
                    alert('Partial payment recorded!');
                    setPaymentAmount('');
                }
            };

                if (confirm('Are you sure you want to delete this order? This will reverse all stock and loyalty points.')) {
                    deleteSale(saleId);
                    alert('Order deleted successfully!');

                const sale = sales.find(s => s.id === changeSaleId);
                if (!sale) return;

                // Reverse old customer loyalty points
                const oldLoyalty = loyaltyTransactions.filter(lt => lt.orderId === changeSaleId);
                oldLoyalty.forEach(lt => {
                    const points = lt.points;
                    setCustomers(prev => prev.map(c => 
                        c.id === sale.customerId 
                            ? { ...c, loyaltyPoints: c.loyaltyPoints - points }
                            : c.id === parseInt(newCustomer)
                            ? { ...c, loyaltyPoints: c.loyaltyPoints + points }
                            : c
                    ));
                });

                // Update sale
                setSales(sales.map(s => 
                    s.id === changeSaleId 
                        ? { ...s, customerId: parseInt(newCustomer) }
                        : s
                ));

                setShowChangeCustomer(false);
                setNewCustomer('');
                alert('Customer changed successfully!');
            };

        function Loyalty({ loyaltyTransactions, customers, sales, deleteSale, setLoyaltyTransactions, setCustomers }) {
            const [filter, setFilter] = useState('all');

            const handleVoidTransaction = (transId) => {
                if (confirm('Are you sure you want to void this loyalty transaction?')) {
                    const trans = loyaltyTransactions.find(t => t.id === transId);
                    if (!trans) return;

                    // Reverse points
                    setCustomers(prev => prev.map(c => 
                        c.id === trans.customerId 
                            ? { 
                                ...c, 
                                loyaltyPoints: trans.type === 'EARNED' 
                                    ? c.loyaltyPoints - trans.points 
                                    : c.loyaltyPoints + trans.points 
                              }
                            : c
                    ));

                    // Mark as voided
                    setLoyaltyTransactions(prev => prev.map(t => 
                        t.id === transId ? { ...t, voided: true } : t
                    ));

                    alert('Transaction voided successfully!');
                }
            };

            const filteredTransactions = loyaltyTransactions.filter(t => {
                if (filter === 'all') return !t.voided;
                if (filter === 'voided') return t.voided;
                return t.type === filter && !t.voided;
            });

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Loyalty Points</h1>
                        <p className="page-subtitle">Track customer loyalty transactions</p>
                    </div>

                    <div className="card">
                        <div style={{ marginBottom: '20px' }}>
                            <label className="form-label">Filter</label>
                            <select 
                                className="form-select"
                                value={filter}
                                onChange={(e) => setFilter(e.target.value)}
                                style={{ maxWidth: '300px' }}
                            >
                                <option value="all">All Active</option>
                                <option value="EARNED">Earned Only</option>
                                <option value="REDEEMED">Redeemed Only</option>
                                <option value="voided">Voided</option>
                            </select>
                        </div>

                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Customer</th>
                                        <th>Order ID</th>
                                        <th>Points</th>
                                        <th>Type</th>
                                        <th>Status</th>
                                        <th>Action</th>

                                </thead>
                                <tbody>
                                    {filteredTransactions.map(trans => {
                                        const customer = customers.find(c => c.id === trans.customerId);
                                        const sale = sales.find(s => s.id === trans.orderId);
                                        return (
                                            <tr key={trans.id} style={{ 
                                                opacity: trans.voided ? 0.5 : 1,
                                                textDecoration: trans.voided ? 'line-through' : 'none'
                                            }}>
                                                <td>{new Date(trans.date).toLocaleDateString()}</td>
                                                <td>{customer?.name || 'N/A'}</td>
                                                <td>
                                                    {sale ? `#${trans.orderId}` : (
                                                        <span style={{ color: '#f56565' }}>
                                                            Deleted Order
                                                        </span>
                                                    )}
                                                </td>
                                                <td>
                                                    <span style={{ 
                                                        fontWeight: '700',
                                                        color: trans.type === 'EARNED' ? '#48bb78' : '#f56565'
                                                    }}>
                                                        {trans.type === 'EARNED' ? '+' : '-'}{trans.points}
                                                    </span>
                                                </td>
                                                <td>
                                                    <span className={`badge badge-${
                                                        trans.type === 'EARNED' ? 'success' : 'warning'
                                                    }`}>
                                                        {trans.type}
                                                    </span>
                                                </td>
                                                <td>

                                                        <span className="badge badge-danger">VOIDED</span>

                                                        </button>

                                            </tr>
                                        );

                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="card" style={{ marginTop: '20px' }}>
                        <h3 style={{ marginBottom: '16px' }}>Customer Points Summary</h3>
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Customer</th>
                                        <th>Total Points</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {customers.map(customer => (
                                        <tr key={customer.id}>
                                            <td>{customer.name}</td>
                                            <td style={{ fontWeight: '700', fontSize: '16px' }}>
                                                {customer.loyaltyPoints}
                                            </td>
                                            <td>
                                                <span className={`badge badge-${
                                                    customer.loyaltyPoints >= 200 ? 'success' : 
                                                    customer.loyaltyPoints >= 100 ? 'warning' : 'info'
                                                }`}>
                                                    {customer.loyaltyPoints >= 200 ? 'Gold' : 
                                                     customer.loyaltyPoints >= 100 ? 'Silver' : 'Bronze'}
                                                </span>
                                            </td>
                                        </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>

            );
        }

        function Repacking({ products, setProducts, repacks, setRepacks, updateStock }) {
            const [outputProduct, setOutputProduct] = useState('');
            const [outputQuantity, setOutputQuantity] = useState(1);
            const [inputMaterials, setInputMaterials] = useState([]);
            const [notes, setNotes] = useState('');

            const addInputMaterial = () => {
                setInputMaterials([...inputMaterials, {
                    productId: '',
                    quantity: 0
                }]);
            };

            const updateInputMaterial = (index, field, value) => {
                const updated = [...inputMaterials];
                updated[index][field] = value;
                setInputMaterials(updated);
            };

            const removeInputMaterial = (index) => {
                setInputMaterials(inputMaterials.filter((_, i) => i !== index));
            };

            const calculateTotals = () => {
                const output = products.find(p => p.id === parseInt(outputProduct));
                const outputTotal = output ? output.weight * outputQuantity : 0;

                const inputTotal = inputMaterials.reduce((sum, input) => {
                    const product = products.find(p => p.id === parseInt(input.productId));
                    return sum + (product ? product.weight * input.quantity : 0);
                }, 0);

                return { outputTotal, inputTotal, difference: inputTotal - outputTotal };
            };

            const processRepack = () => {
                if (!outputProduct || outputQuantity <= 0) {
                    alert('Please select output product and quantity');
                    return;
                }

                if (inputMaterials.length === 0) {
                    alert('Please add input materials');
                    return;
                }

                // Validate input materials
                for (let input of inputMaterials) {
                    if (!input.productId || input.quantity <= 0) {
                        alert('Please fill all input material details');
                        return;
                    }

                    const product = products.find(p => p.id === parseInt(input.productId));
                    if (!product || product.stock < input.quantity) {
                        alert(`Insufficient stock for ${product?.name || 'product'}`);
                        return;
                    }
                }

                const { outputTotal, inputTotal, difference } = calculateTotals();

                // Check weight balance
                if (Math.abs(difference) > outputTotal * 0.05) {
                    if (!confirm(`Weight mismatch detected! Input: ${inputTotal}gm, Output: ${outputTotal}gm. Continue?`)) {
                        return;
                    }
                }

                // Create repack record
                const repack = {
                    id: Date.now(),
                    reference: `RPK-${Date.now()}`,
                    outputProductId: parseInt(outputProduct),
                    outputQuantity,
                    inputMaterials: inputMaterials.map(im => ({
                        productId: parseInt(im.productId),
                        quantity: parseInt(im.quantity)
                    })),
                    wastage: difference > 0 ? difference : 0,
                    notes,
                    date: new Date().toISOString()
                };

                // Update stock - deduct inputs
                inputMaterials.forEach(input => {
                    updateStock(parseInt(input.productId), parseInt(input.quantity), 'OUT', repack.reference);
                });

                // Update stock - add output
                updateStock(parseInt(outputProduct), outputQuantity, 'IN', repack.reference);

                setRepacks([...repacks, repack]);

                alert('Repacking completed successfully!');

                // Reset form
                setOutputProduct('');
                setOutputQuantity(1);
                setInputMaterials([]);
                setNotes('');
            };

            const { outputTotal, inputTotal, difference } = calculateTotals();

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Repacking Module</h1>
                        <p className="page-subtitle">Create new packages from existing stock</p>
                    </div>

                    <div className="grid-2">
                        <div className="card">
                            <h3 style={{ marginBottom: '16px', color: '#1B5E20' }}>Output Product</h3>

                            <div className="form-group">
                                <label className="form-label">Product</label>
                                <select 
                                    className="form-select"
                                    value={outputProduct}
                                    onChange={(e) => setOutputProduct(e.target.value)}
                                >
                                    <option value="">Select Output Product</option>
                                    {products.map(p => (
                                        <option key={p.id} value={p.id}>
                                            {p.name} ({p.weight}gm)
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Quantity to Create</label>
                                <input 
                                    type="number"
                                    className="form-input"
                                    value={outputQuantity}
                                    onChange={(e) => setOutputQuantity(parseInt(e.target.value) || 0)}
                                    min="1"
                                />
                            </div>

                            <div style={{ 
                                padding: '16px',
                                background: '#E8F5E9',
                                borderRadius: '8px',
                                marginTop: '16px'
                            }}>
                                <strong>Total Output Weight:</strong> {outputTotal}gm
                            </div>
                        </div>

                        <div className="card">
                            <h3 style={{ marginBottom: '16px', color: '#B71C1C' }}>Input Materials</h3>

                            {inputMaterials.map((input, index) => (
                                <div key={index} className="repack-input-row">
                                    <select 
                                        className="form-select"
                                        value={input.productId}
                                        onChange={(e) => updateInputMaterial(index, 'productId', e.target.value)}
                                    >
                                        <option value="">Select Product</option>
                                        {products.filter(p => p.stock > 0).map(p => (
                                            <option key={p.id} value={p.id}>
                                                {p.name} (Stock: {p.stock})
                                            </option>
                                        ))}
                                    </select>

                                    <input 
                                        type="number"
                                        className="form-input"
                                        value={input.quantity}
                                        onChange={(e) => updateInputMaterial(index, 'quantity', e.target.value)}
                                        placeholder="Qty"
                                        min="1"
                                    />

                                    <div style={{ padding: '12px', background: '#f7fafc', borderRadius: '8px' }}>
                                        {input.productId ? (
                                            products.find(p => p.id === parseInt(input.productId))?.weight * input.quantity || 0
                                        ) : 0}gm
                                    </div>

                                    <button 
                                        className="btn btn-danger"
                                        onClick={() => removeInputMaterial(index)}
                                        style={{ padding: '8px 16px' }}
                                    >
                                        Remove
                                    </button>
                                </div>
                            ))}

                            <button 
                                className="btn btn-secondary"
                                onClick={addInputMaterial}
                                style={{ marginTop: '12px' }}
                            >
                                + Add Input Material
                            </button>

                            <div style={{ 
                                padding: '16px',
                                background: '#FFEBEE',
                                borderRadius: '8px',
                                marginTop: '16px'
                            }}>
                                <div><strong>Total Input Weight:</strong> {inputTotal}gm</div>
                                <div style={{ marginTop: '8px' }}>
                                    <strong>Difference:</strong>{' '}
                                    <span style={{ 
                                        color: Math.abs(difference) < 10 ? '#48bb78' : '#f56565',
                                        fontWeight: '700'
                                    }}>
                                        {difference > 0 ? '+' : ''}{difference}gm
                                        {Math.abs(difference) > outputTotal * 0.05 && ' ⚠️'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="form-group">
                            <label className="form-label">Notes (Optional)</label>
                            <textarea 
                                className="form-input"
                                value={notes}
                                onChange={(e) => setNotes(e.target.value)}
                                rows="3"
                                placeholder="Any notes about this repack..."
                            />
                        </div>

                        <button 
                            className="btn btn-success"
                            onClick={processRepack}
                            style={{ width: '100%', padding: '16px', fontSize: '16px' }}
                        >
                            Process Repack
                        </button>
                    </div>

                    <div className="card">
                        <h3 style={{ marginBottom: '16px' }}>Repack History</h3>
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Reference</th>
                                        <th>Date</th>
                                        <th>Output</th>
                                        <th>Input Materials</th>
                                        <th>Wastage</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {repacks.slice().reverse().map(repack => {
                                        const output = products.find(p => p.id === repack.outputProductId);
                                        return (
                                            <tr key={repack.id}>
                                                <td>{repack.reference}</td>
                                                <td>{new Date(repack.date).toLocaleDateString()}</td>
                                                <td>
                                                    {output?.name} × {repack.outputQuantity}
                                                </td>
                                                <td>
                                                    {repack.inputMaterials.map((im, i) => {
                                                        const p = products.find(pr => pr.id === im.productId);
                                                        return (
                                                            <div key={i}>
                                                                {p?.name} × {im.quantity}
                                                            </div>
                                                        );
                                                    })}
                                                </td>
                                                <td>{repack.wastage}gm</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function DemandPrediction({ sales, products }) {
            const [period, setPeriod] = useState('daily');

            // Calculate predictions
            const calculatePredictions = () => {
                const now = new Date();
                const today = now.toISOString().split('T')[0];

                if (period === 'daily') {
                    // Day-on-day
                    const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                    const todaySales = sales.filter(s => s.date.startsWith(today)).reduce((sum, s) => sum + s.total, 0);
                    const yesterdaySales = sales.filter(s => s.date.startsWith(yesterday)).reduce((sum, s) => sum + s.total, 0);
                    const change = yesterdaySales > 0 ? ((todaySales - yesterdaySales) / yesterdaySales * 100).toFixed(1) : 0;

                    return {
                        current: todaySales,
                        previous: yesterdaySales,
                        change: change,
                        trend: change > 0 ? 'up' : change < 0 ? 'down' : 'stable'
                    };
                } else if (period === 'weekly') {
                    // Week-on-week
                    const thisWeekStart = new Date(now.getTime() - now.getDay() * 24 * 60 * 60 * 1000);
                    const lastWeekStart = new Date(thisWeekStart.getTime() - 7 * 24 * 60 * 60 * 1000);

                    const thisWeekSales = sales.filter(s => new Date(s.date) >= thisWeekStart).reduce((sum, s) => sum + s.total, 0);
                    const lastWeekSales = sales.filter(s => {
                        const date = new Date(s.date);
                        return date >= lastWeekStart && date < thisWeekStart;
                    }).reduce((sum, s) => sum + s.total, 0);

                    const change = lastWeekSales > 0 ? ((thisWeekSales - lastWeekSales) / lastWeekSales * 100).toFixed(1) : 0;

                    return {
                        current: thisWeekSales,
                        previous: lastWeekSales,
                        change: change,
                        trend: change > 0 ? 'up' : change < 0 ? 'down' : 'stable'
                    };
                } else {
                    // Month-on-month
                    const thisMonth = now.getMonth();
                    const thisYear = now.getFullYear();
                    const lastMonth = thisMonth === 0 ? 11 : thisMonth - 1;
                    const lastYear = thisMonth === 0 ? thisYear - 1 : thisYear;

                    const thisMonthSales = sales.filter(s => {
                        const d = new Date(s.date);
                        return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
                    }).reduce((sum, s) => sum + s.total, 0);

                    const lastMonthSales = sales.filter(s => {
                        const d = new Date(s.date);
                        return d.getMonth() === lastMonth && d.getFullYear() === lastYear;
                    }).reduce((sum, s) => sum + s.total, 0);

                    const change = lastMonthSales > 0 ? ((thisMonthSales - lastMonthSales) / lastMonthSales * 100).toFixed(1) : 0;

                    return {
                        current: thisMonthSales,
                        previous: lastMonthSales,
                        change: change,
                        trend: change > 0 ? 'up' : change < 0 ? 'down' : 'stable'
                    };
                }
            };

            const prediction = calculatePredictions();

            // Top selling products
            const productSales = {};
            sales.forEach(sale => {
                sale.items.forEach(item => {
                    if (!productSales[item.productId]) {
                        productSales[item.productId] = {
                            name: item.name,
                            quantity: 0,
                            revenue: 0
                        };
                    }
                    productSales[item.productId].quantity += item.quantity;
                    productSales[item.productId].revenue += item.quantity * item.price;
                });
            });

            const topProducts = Object.values(productSales)
                .sort((a, b) => b.revenue - a.revenue)
                .slice(0, 5);

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Demand Prediction</h1>
                        <p className="page-subtitle">Analyze sales trends and forecast demand</p>
                    </div>

                    <div className="tabs">
                        <div 
                            className={`tab ${period === 'daily' ? 'active' : ''}`}
                            onClick={() => setPeriod('daily')}
                        >
                            Day-on-Day
                        </div>
                        <div 
                            className={`tab ${period === 'weekly' ? 'active' : ''}`}
                            onClick={() => setPeriod('weekly')}
                        >
                            Week-on-Week
                        </div>
                        <div 
                            className={`tab ${period === 'monthly' ? 'active' : ''}`}
                            onClick={() => setPeriod('monthly')}
                        >
                            Month-on-Month
                        </div>
                    </div>

                    <div className="prediction-card">
                        <div className="prediction-title">
                            {period === 'daily' ? 'Today vs Yesterday' : 
                             period === 'weekly' ? 'This Week vs Last Week' :
                             'This Month vs Last Month'}
                        </div>
                        <div className="prediction-value">
                            ₹{prediction.current.toLocaleString()}
                        </div>
                        <div className="prediction-trend">
                            {prediction.trend === 'up' ? '↑' : prediction.trend === 'down' ? '↓' : '→'}
                            {' '}{Math.abs(prediction.change)}% vs previous period (₹{prediction.previous.toLocaleString()})
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{ marginBottom: '16px' }}>Top Selling Products</h3>
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Rank</th>
                                        <th>Product</th>
                                        <th>Quantity Sold</th>
                                        <th>Revenue</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {topProducts.map((product, index) => (
                                        <tr key={index}>
                                            <td>{index + 1}</td>
                                            <td>{product.name}</td>
                                            <td>{product.quantity}</td>
                                            <td>₹{product.revenue}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{ marginBottom: '16px' }}>Insights & Recommendations</h3>
                        <div className="alert alert-info">
                            <strong>💡 Insight:</strong> Based on current trends:
                            <ul style={{ marginTop: '12px', marginLeft: '20px' }}>
                                <li>
                                    Sales are {prediction.trend === 'up' ? 'increasing' : prediction.trend === 'down' ? 'decreasing' : 'stable'}
                                    {' '}by {Math.abs(prediction.change)}% compared to previous period
                                </li>
                                {topProducts.length > 0 && (
                                    <li>
                                        Top product: <strong>{topProducts[0].name}</strong> with ₹{topProducts[0].revenue} revenue
                                    </li>
                                )}
                                <li>
                                    Total sales this period: ₹{prediction.current.toLocaleString()}
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        function Customers({ customers, setCustomers, sales, loyaltyTransactions }) {
            const [showAddCustomer, setShowAddCustomer] = useState(false);
            const [newCustomer, setNewCustomer] = useState({ name: '', phone: '' });

            const addCustomer = () => {
                if (!newCustomer.name || !newCustomer.phone) {
                    alert('Please fill all fields');
                    return;
                }

                setCustomers([...customers, {
                    ...newCustomer,
                    id: Date.now(),
                    loyaltyPoints: 0
                }]);

                setNewCustomer({ name: '', phone: '' });
                setShowAddCustomer(false);
            };

            const getCustomerStats = (customerId) => {
                const customerSales = sales.filter(s => s.customerId === customerId);
                const totalSpent = customerSales.reduce((sum, s) => sum + s.total, 0);
                return {
                    orders: customerSales.length,
                    totalSpent
                };
            };

            return (
                <div>
                    <div className="page-header">
                        <div>
                            <h1 className="page-title">Customers</h1>
                            <p className="page-subtitle">Manage customer information</p>
                        </div>
                        <button className="btn btn-primary" onClick={() => setShowAddCustomer(true)}>
                            + Add Customer
                        </button>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Phone</th>
                                        <th>Loyalty Points</th>
                                        <th>Total Orders</th>
                                        <th>Total Spent</th>
                                        <th>Tier</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {customers.map(customer => {
                                        const stats = getCustomerStats(customer.id);
                                        return (
                                            <tr key={customer.id}>
                                                <td>{customer.name}</td>
                                                <td>{customer.phone}</td>
                                                <td style={{ fontWeight: '700', fontSize: '16px' }}>
                                                    {customer.loyaltyPoints}
                                                </td>
                                                <td>{stats.orders}</td>
                                                <td>₹{stats.totalSpent}</td>
                                                <td>
                                                    <span className={`badge badge-${
                                                        customer.loyaltyPoints >= 200 ? 'success' : 
                                                        customer.loyaltyPoints >= 100 ? 'warning' : 'info'
                                                    }`}>
                                                        {customer.loyaltyPoints >= 200 ? 'Gold' : 
                                                         customer.loyaltyPoints >= 100 ? 'Silver' : 'Bronze'}
                                                    </span>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showAddCustomer && (
                        <div className="modal">
                            <div className="modal-content">
                                <h2 className="modal-header">Add New Customer</h2>

                                <div className="form-group">
                                    <label className="form-label">Name</label>
                                    <input 
                                        className="form-input"
                                        value={newCustomer.name}
                                        onChange={(e) => setNewCustomer({...newCustomer, name: e.target.value})}
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Phone</label>
                                    <input 
                                        className="form-input"
                                        value={newCustomer.phone}
                                        onChange={(e) => setNewCustomer({...newCustomer, phone: e.target.value})}
                                    />
                                </div>

                                <div className="modal-footer">
                                    <button className="btn btn-secondary" onClick={() => setShowAddCustomer(false)}>
                                        Cancel
                                    </button>
                                    <button className="btn btn-primary" onClick={addCustomer}>
                                        Add Customer
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
